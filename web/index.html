<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiro-Go</title>
    <link rel="stylesheet" href="/admin/css/styles.css">
    <link rel="stylesheet" href="/admin/css/components.css">
</head>

<body>
    <div id="loginPage" class="login-wrapper">
        <div class="login-box">
            <div class="login-lang">
                <div class="lang-switch">
                    <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
                    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
                </div>
            </div>
            <h1 class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                Kiro-Go
            </h1>
            <p data-i18n="login.subtitle"></p>
            <div class="form-group">
                <label data-i18n="login.password"></label>
                <input type="password" id="pwdField" data-i18n-placeholder="login.passwordPlaceholder" autocomplete="off">
            </div>
            <button type="button" class="btn btn-primary u-w-full" onclick="login()" data-i18n="login.submit"></button>
            <div id="loginError" class="message message-error hidden login-error"></div>
        </div>
    </div>

    <div id="mainPage" class="container hidden">
        <div class="header">
            <h1 class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                Kiro-Go
            </h1>
            <div class="header-right">
                <div class="lang-switch">
                    <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
                    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
                </div>
                <span class="badge badge-success" id="statusBadge" data-i18n="status.running"></span>
                <span class="badge badge-info version-badge" id="versionBadge" onclick="checkUpdate(true)"></span>
                <button class="btn btn-sm btn-danger btn-logout" onclick="logout()" data-i18n="common.logout"></button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statAccounts">0</div>
                <div class="stat-label" data-i18n="stats.accounts"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statRequests">0</div>
                <div class="stat-label" data-i18n="stats.requests"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSuccess">0</div>
                <div class="stat-label" data-i18n="stats.success"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statFailed">0</div>
                <div class="stat-label" data-i18n="stats.failed"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statTokens">0</div>
                <div class="stat-label">Tokens</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statCredits">0</div>
                <div class="stat-label">Credits</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="accounts" data-i18n="tabs.accounts"></div>
            <div class="tab" data-tab="settings" data-i18n="tabs.settings"></div>
            <div class="tab" data-tab="api" data-i18n="tabs.api"></div>
        </div>

        <div id="tabAccounts" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <span class="card-title" data-i18n="accounts.title"></span>
                    <div class="card-actions">
                        <div class="privacy-toggle">
                            <span class="privacy-label" data-i18n="privacy.label"></span>
                            <label class="switch">
                                <input type="checkbox" id="privacyModeToggle" checked onchange="togglePrivacyMode()">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="btn btn-secondary btn-sm" onclick="showExportModal()" data-i18n="accounts.export"></button>
                        <button class="btn btn-primary btn-sm" onclick="showModal('add')" data-i18n="accounts.add"></button>
                    </div>
                </div>
                <div class="card-toolbar">
                    <label class="toolbar-checkbox">
                        <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this.checked)">
                        <span data-i18n="batch.selectAll"></span>
                    </label>
                    <div class="toolbar-divider"></div>
                    <div id="batchBar" class="batch-bar">
                        <span id="batchCount" class="batch-count"></span>
                        <button class="btn btn-sm btn-primary batch-btn" onclick="batchAction('enable')" data-i18n="batch.enable" aria-label="Batch enable"></button>
                        <button class="btn btn-sm btn-secondary batch-btn" onclick="batchAction('disable')" data-i18n="batch.disable" aria-label="Batch disable"></button>
                        <button class="btn btn-sm btn-secondary batch-btn" onclick="batchAction('refresh')" data-i18n="batch.refresh" aria-label="Batch refresh"></button>
                        <div class="toolbar-divider"></div>
                    </div>
                    <div class="filter-group">
                        <input type="text" id="filterSearch" class="filter-search" oninput="onFilterChange()" data-i18n-placeholder="filter.search">
                        <select id="filterStatusSelect" class="filter-status" onchange="onFilterChange()">
                            <option value="all" data-i18n="filter.all"></option>
                            <option value="enabled" data-i18n="filter.enabled"></option>
                            <option value="disabled" data-i18n="filter.disabled"></option>
                            <option value="banned" data-i18n="filter.banned"></option>
                        </select>
                    </div>
                </div>
                <div id="accountsList"></div>
            </div>
        </div>

        <div id="tabSettings" class="tab-content hidden">
            <div class="card">
                <div class="card-header"><span class="card-title" data-i18n="settings.apiSettings"></span></div>
                <div class="form-group">
                    <label class="settings-label-inline">
                        <label class="switch"><input type="checkbox" id="requireApiKey"><span class="slider"></span></label>
                        <span data-i18n="settings.enableApiKey"></span>
                    </label>
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <div class="input-row">
                        <input type="text" id="apiKeyInput" class="u-flex-1" data-i18n-placeholder="settings.apiKeyPlaceholder">
                        <button class="btn btn-sm btn-secondary" onclick="generateApiKey()" data-i18n="settings.generateApiKey"></button>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveSettings(this)" data-i18n="common.save"></button>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title" data-i18n="settings.thinkingSettings"></span></div>
                <div class="form-group">
                    <label data-i18n="settings.thinkingSuffix"></label>
                    <input type="text" id="thinkingSuffix" placeholder="-thinking">
                    <small class="hint-small" data-i18n="settings.thinkingSuffixHint"></small>
                </div>
                <div class="form-group">
                    <label data-i18n="settings.openaiFormat"></label>
                    <select id="openaiThinkingFormat">
                        <option value="reasoning_content">reasoning_content (DeepSeek)</option>
                        <option value="thinking">&lt;thinking&gt; (Claude)</option>
                        <option value="think">&lt;think&gt; (OpenAI)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="settings.claudeFormat"></label>
                    <select id="claudeThinkingFormat">
                        <option value="thinking">&lt;thinking&gt; (Claude)</option>
                        <option value="think">&lt;think&gt; (OpenAI)</option>
                        <option value="reasoning_content" data-i18n="settings.noTag"></option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="saveThinkingConfig(this)" data-i18n="settings.saveThinking"></button>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title" data-i18n="settings.endpointSettings"></span></div>
                <div class="form-group">
                    <label data-i18n="settings.preferredEndpoint"></label>
                    <select id="preferredEndpoint">
                        <option value="auto" data-i18n="settings.endpointAuto"></option>
                        <option value="kiro">Kiro IDE</option>
                        <option value="codewhisperer">CodeWhisperer</option>
                        <option value="amazonq">AmazonQ</option>
                    </select>
                    <small class="hint-small" data-i18n="settings.endpointHint"></small>
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                        <input type="checkbox" id="endpointFallback" checked>
                        <span data-i18n="settings.endpointFallback"></span>
                    </label>
                    <small class="hint-small" data-i18n="settings.endpointFallbackHint"></small>
                </div>
                <button class="btn btn-primary" onclick="saveEndpointConfig(this)" data-i18n="settings.saveEndpoint"></button>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title" data-i18n="settings.adminPassword"></span></div>
                <div class="form-group">
                    <label data-i18n="settings.newPassword"></label>
                    <input type="password" id="newPassword" data-i18n-placeholder="settings.newPasswordPlaceholder">
                </div>
                <button class="btn btn-primary" onclick="changePassword(this)" data-i18n="settings.changePassword"></button>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title" data-i18n="settings.proxySettings"></span></div>
                <div class="form-group">
                    <label data-i18n="settings.proxyType"></label>
                    <select id="proxyType" onchange="onProxyTypeChange()">
                        <option value="none" data-i18n="settings.proxyNone"></option>
                        <option value="socks5">SOCKS5</option>
                        <option value="http">HTTP</option>
                    </select>
                </div>
                <div id="proxyFields" style="display:none">
                    <div class="form-group">
                        <label data-i18n="settings.proxyHost"></label>
                        <div style="display:flex;gap:8px;align-items:stretch">
                            <input type="text" id="proxyHost" style="flex:1" placeholder="127.0.0.1">
                            <input type="number" id="proxyPort" style="width:90px" placeholder="1080" min="1" max="65535">
                        </div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="settings.proxyAuth"></label>
                        <div style="display:flex;gap:8px">
                            <input type="text" id="proxyUsername" style="flex:1" data-i18n-placeholder="settings.proxyUsername" autocomplete="off">
                            <input type="password" id="proxyPassword" style="flex:1" data-i18n-placeholder="settings.proxyPassword" autocomplete="new-password">
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveProxyConfig()" data-i18n="settings.saveProxy"></button>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title" data-i18n="settings.statistics"></span></div>
                <button class="btn btn-danger" onclick="resetStats(this)" data-i18n="settings.resetStats"></button>
            </div>
        </div>

        <div id="tabApi" class="tab-content hidden">
            <div class="card">
                <div class="card-header"><span class="card-title" data-i18n="api.endpoints"></span></div>
                <p class="section-title">Claude API</p>
                <div class="endpoint"><span id="claudeEndpoint"></span><button class="btn btn-sm btn-secondary" onclick="copy('claudeEndpoint')" data-i18n="common.copy"></button></div>
                <p class="section-subtitle">OpenAI API</p>
                <div class="endpoint"><span id="openaiEndpoint"></span><button class="btn btn-sm btn-secondary" onclick="copy('openaiEndpoint')" data-i18n="common.copy"></button></div>
                <p class="section-subtitle" data-i18n="api.modelList"></p>
                <div class="endpoint"><span id="modelsEndpoint"></span><button class="btn btn-sm btn-secondary" onclick="copy('modelsEndpoint')" data-i18n="common.copy"></button></div>
                <p class="section-subtitle" data-i18n="api.stats"></p>
                <div class="endpoint"><span id="statsEndpoint"></span><button class="btn btn-sm btn-secondary" onclick="copy('statsEndpoint')" data-i18n="common.copy"></button></div>
                <p class="hint-footnote" data-i18n="api.statsHint"></p>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span class="modal-title" id="modalTitle"></span><button class="modal-close" onclick="closeModal()">&times;</button></div>
            <div id="modalBody"></div>
        </div>
    </div>
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span class="modal-title" data-i18n="detail.title"></span><button class="modal-close" onclick="closeDetailModal()">&times;</button></div>
            <div id="detailBody"></div>
        </div>
    </div>
    <div id="exportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span class="modal-title" data-i18n="export.title"></span><button class="modal-close" onclick="closeExportModal()">&times;</button></div>
            <div id="exportBody"></div>
        </div>
    </div>
    <div id="updateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span class="modal-title" data-i18n="update.title"></span><button class="modal-close" onclick="closeUpdateModal()">&times;</button></div>
            <div id="updateBody"></div>
        </div>
    </div>

    <script src="/admin/js/i18n.js"></script>
    <script src="/admin/js/ui.js"></script>
    <script src="/admin/js/utils.js"></script>
    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/accounts.js"></script>
    <script src="/admin/js/modals.js"></script>
    <script src="/admin/js/settings.js"></script>
    <script src="/admin/js/export.js"></script>
    <script src="/admin/js/update.js"></script>
    <script src="/admin/js/app.js"></script>
</body>

</html>
